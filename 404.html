<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | INNOVACANN</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #F8F9FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .box h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            color: #2D5A3D;
        }

        .box h2 {
            font-family: 'Outfit', sans-serif;
            color: #1A1A2E;
            margin-bottom: 10px;
        }

        .box p { color: #5A6275; margin-bottom: 26px; }

        .box a {
            display: inline-block;
            background: #2D5A3D;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            padding: 13px 30px;
            border-radius: 50px;
        }

        .box a:hover { background: #1E3F2B; }
    </style>
</head>

<body>
    <div class="box">
        <h1>404</h1>
        <h2>Página no encontrada</h2>
        <p>La página que buscas no existe o fue movida.</p>
        <a href="/">Volver al inicio</a>
    </div>
</body>

</html>
